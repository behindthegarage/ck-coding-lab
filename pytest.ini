[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov=auth
    --cov=database
    --cov=sandbox
    --cov=ai
    --cov=chat
    --cov=versions
    --cov=projects
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use database, API calls)
    slow: Slow tests
    auth: Authentication-related tests
    sandbox: Sandbox/security tests
    models: Database model tests
    api: API endpoint tests
